services:
  - type: web
    name: paidup
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 init_db.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./paidup.db
      - key: BASE_URL
        value: https://paidup.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SENDGRID_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
