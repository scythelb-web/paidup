<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PaidUp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1a1d27; padding: 40px; border-radius: 12px; border: 1px solid #262a36; width: 100%; max-width: 400px; }
        .card h1 { font-size: 24px; margin-bottom: 8px; }
        .card p { color: #a1a1aa; font-size: 14px; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #a1a1aa; }
        input { width: 100%; padding: 10px 12px; background: #0f1117; border: 1px solid #333; border-radius: 6px; color: #e4e4e7; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #22c55e; }
        button { width: 100%; padding: 12px; background: #22c55e; color: #0f1117; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #16a34a; }
        .link { text-align: center; margin-top: 16px; font-size: 13px; color: #a1a1aa; }
        .link a { color: #22c55e; text-decoration: none; }
        .back { display: block; text-align: center; color: #a1a1aa; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome Back</h1>
        <p>Log in to your PaidUp account.</p>
        <form method="post">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@example.com">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Your password">
            <button type="submit">Log In</button>
        </form>
        <div class="link">Don't have an account? <a href="/auth/signup">Sign up</a></div>
        <a href="/" class="back">← Back to home</a>
    </div>
</body>
</html>
